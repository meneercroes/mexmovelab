<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MOTION Social Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #1a1a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    background: #fff;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  header img {
    height: 60px;
  }
  header .tagline {
    font-size: 11px;
    font-weight: 700;
    color: #222;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.5;
    flex: 1;
  }
  header .format-tabs {
    display: flex;
    gap: 6px;
  }
  .format-tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid #ccc;
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #555;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .format-tab:hover { border-color: #888; color: #111; }
  .format-tab.active { background: #111; border-color: #111; color: #FFF042; }

  /* ─── Layout ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Controls Panel ─── */
  .controls {
    width: 320px;
    min-width: 320px;
    background: #111;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    border-right: 1px solid #333;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #FFF042;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .field label {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.5px;
  }
  .field input[type=text] {
    background: #222;
    border: 1px solid #444;
    border-radius: 4px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input[type=text]:focus { border-color: #FFF042; }
  .field input[type=range] { accent-color: #FFF042; width: 100%; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-val {
    font-size: 12px;
    color: #FFF042;
    min-width: 28px;
    text-align: right;
  }
  .divider { border: none; border-top: 1px solid #333; }

  /* ─── Folder picker ─── */
  .folder-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    color: #ccc;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 9px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    width: 100%;
    text-align: left;
  }
  .folder-btn:hover { border-color: #FFF042; color: #FFF042; }
  .folder-btn svg { flex-shrink: 0; }
  .folder-hint {
    font-size: 10px;
    color: #555;
    line-height: 1.5;
    margin-top: 4px;
  }
  .folder-count {
    font-size: 10px;
    color: #FFF042;
    margin-top: 4px;
    display: none;
  }
  .folder-count.visible { display: block; }

  /* ─── Photo grid ─── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    max-height: 260px;
    overflow-y: auto;
    padding: 2px;
  }
  .photo-grid:empty::after {
    content: 'Selecteer eerst een map';
    grid-column: 1/-1;
    text-align: center;
    font-size: 11px;
    color: #444;
    padding: 20px;
    display: block;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    background: #222;
  }
  .photo-thumb:hover { border-color: #888; transform: scale(1.04); }
  .photo-thumb.selected { border-color: #FFF042; }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-thumb .thumb-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.75);
    font-size: 7px;
    text-align: center;
    padding: 2px 3px;
    color: #ccc;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .photo-thumb:hover .thumb-name { opacity: 1; }

  /* ─── Buttons ─── */
  .btn-primary {
    background: #FFF042;
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 11px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .btn-primary:hover { background: #ffe800; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: #888;
    border: 1px solid #444;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #888; color: #ccc; }
  .btn-row { display: flex; gap: 8px; }

  /* ─── Toggle ─── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .toggle-row input[type=checkbox] {
    accent-color: #FFF042;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .toggle-row span { font-size: 11px; color: #aaa; }

  /* ─── Color badges ─── */
  .color-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
  }

  /* ─── Preview area ─── */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    gap: 20px;
    background: #1a1a1a;
    overflow: auto;
    position: relative;
  }
  .preview-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    position: absolute;
    top: 14px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .canvas-wrap {
    position: relative;
    box-shadow: 0 12px 60px rgba(0,0,0,0.8);
    border-radius: 2px;
    overflow: hidden;
    background: #000;
  }
  canvas { display: block; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  .canvas-dims {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    text-align: center;
    margin-top: -10px;
  }

  /* ─── Format info strip ─── */
  .format-info {
    display: flex;
    gap: 20px;
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }
  .format-info span { text-transform: uppercase; }
  .format-info strong { color: #666; }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* ─── Loading overlay ─── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #FFF042;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
    display: none;
  }
</style>
</head>
<body>

<!-- Hidden folder input -->
<input type="file" id="folderInput" webkitdirectory multiple accept="image/*" style="display:none">

<!-- ─── Header ─── -->
<header>
  <img src="https://cdn.prod.website-files.com/6724d741e1f143ef904f35a4/6724db37e365f76fc6d5692f_nav_logo.png" alt="MOTION Beweeg College" onerror="this.style.display='none'">
  <div class="tagline">Social<br>Generator</div>
  <div class="format-tabs">
    <button class="format-tab active" data-fmt="ig-square" onclick="setFormat('ig-square')">IG Square</button>
    <button class="format-tab" data-fmt="ig-portrait" onclick="setFormat('ig-portrait')">IG Portrait</button>
    <button class="format-tab" data-fmt="linkedin" onclick="setFormat('linkedin')">LinkedIn</button>
  </div>
</header>

<!-- ─── Main ─── -->
<div class="main">

  <!-- Controls -->
  <div class="controls">

    <!-- FOTO SECTIE -->
    <div>
      <div class="section-label">📁 Foto</div>
      <button class="folder-btn" onclick="document.getElementById('folderInput').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        Selecteer map met foto's
      </button>
      <div class="folder-hint">Werkt met lokaal gesynchroniseerde mappen, zoals OneDrive of Google Drive op je Mac.</div>
      <div class="folder-count" id="folderCount"></div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>

    <hr class="divider">

    <!-- TEKST SECTIE -->
    <div>
      <div class="section-label">✏️ Tekst</div>
      <div class="field">
        <label>Label (kleine tekst)</label>
        <input type="text" id="labelText" value="GEZOCHT" oninput="draw()" placeholder="bv. GEZOCHT">
      </div>
      <div class="field">
        <label>Titel 1</label>
        <input type="text" id="regel1" value="DOCENT" oninput="draw()" placeholder="bv. DOCENT" autofocus>
      </div>
      <div class="field">
        <label>Titel 2</label>
        <input type="text" id="regel2" value="NEDERLANDS" oninput="draw()" placeholder="bv. NEDERLANDS">
      </div>
    </div>

    <hr class="divider">

    <!-- OPMAAK -->
    <div>
      <div class="section-label">🎨 Opmaak</div>

      <div class="field">
        <label>Lettergrootte Titel 1</label>
        <div class="range-row">
          <input type="range" id="titleScale1" min="40" max="130" value="100" oninput="updateRange(this,'titleScale1Val'); draw()">
          <span class="range-val" id="titleScale1Val">100</span>
        </div>
      </div>

      <div class="field">
        <label>Lettergrootte Titel 2</label>
        <div class="range-row">
          <input type="range" id="titleScale2" min="40" max="130" value="100" oninput="updateRange(this,'titleScale2Val'); draw()">
          <span class="range-val" id="titleScale2Val">100</span>
        </div>
      </div>

      <div class="field">
        <label>Kleur-offset sterkte</label>
        <div class="range-row">
          <input type="range" id="offsetAmount" min="2" max="20" value="6" oninput="updateRange(this,'offsetVal'); draw()">
          <span class="range-val" id="offsetVal">6</span>
        </div>
      </div>

      <div class="field">
        <label>Tekstpositie (verticaal %)</label>
        <div class="range-row">
          <input type="range" id="textPosY" min="40" max="95" value="72" oninput="updateRange(this,'textPosVal'); draw()">
          <span class="range-val" id="textPosVal">72</span>
        </div>
      </div>

      <div class="field">
        <label>Tekstpositie (horizontaal %)</label>
        <div class="range-row">
          <input type="range" id="textPosX" min="2" max="20" value="5" oninput="updateRange(this,'textPosXVal'); draw()">
          <span class="range-val" id="textPosXVal">5</span>
        </div>
      </div>

      <div class="field">
        <label>Gradient overlay</label>
        <div class="range-row">
          <input type="range" id="gradOpacity" min="0" max="100" value="50" oninput="updateRange(this,'gradVal'); draw()">
          <span class="range-val" id="gradVal">50</span>
        </div>
      </div>

      <div class="toggle-row" onclick="toggleCheck('showLogo'); draw()">
        <input type="checkbox" id="showLogo" checked>
        <span>MOTION logo rechtsonder</span>
      </div>

      <div class="toggle-row" style="margin-top:8px" onclick="toggleCheck('showUrl'); draw()">
        <input type="checkbox" id="showUrl">
        <span>Website URL tonen</span>
      </div>
    </div>

    <hr class="divider">

    <!-- EXPORT -->
    <div>
      <div class="section-label">⬇️ Download</div>
      <div class="btn-row">
        <button class="btn-primary" onclick="downloadImage()" style="flex:1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Download PNG
        </button>
      </div>
      <div style="font-size:10px; color:#555; margin-top:6px; line-height:1.5;" id="downloadInfo">IG Square · 1080 × 1080 px</div>
    </div>

  </div><!-- /controls -->

  <!-- Preview -->
  <div class="preview-area">
    <div class="preview-label">Voorbeeld</div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="c"></canvas>
    </div>
    <div class="canvas-dims" id="canvasDims">1080 × 1080 px</div>
  </div>

</div><!-- /main -->

// ─── Drag state ───────────────────────────────────────────────────
let isDragging    = false;
let dragMode      = null;   // 'photo' | 'text'
let dragStartMX   = 0, dragStartMY = 0;
let photoOffsetX  = 0, photoOffsetY = 0;
let dragStartPhX  = 0, dragStartPhY = 0;
let dragStartTxtY = 0;
let lastBlockTop  = 0, lastBlockH = 0;  // bijgehouden in draw()

// ─── Initialiseer canvas ──────────────────────────────────────────
function initCanvas() {
  const fmt = FORMATS[currentFmt];
  canvas.width = fmt.w;
  canvas.height = fmt.h;
  canvas.style.width  = Math.round(fmt.w * fmt.scale) + 'px';
  canvas.style.height = Math.round(fmt.h * fmt.scale) + 'px';
  document.getElementById('canvasDims').textContent = `${fmt.w} × ${fmt.h} px`;
  document.getElementById('downloadInfo').textContent = `${fmt.label} · ${fmt.w} × ${fmt.h} px`;
}

// ─── Format wisselen ─────────────────────────────────────────────
function setFormat(fmt) {
  currentFmt = fmt;
  document.querySelectorAll('.format-tab').forEach(t => t.classList.toggle('active', t.dataset.fmt === fmt));
  initCanvas();
  draw();
}

// ─── Helpers ─────────────────────────────────────────────────────
function updateRange(el, valId) {
  document.getElementById(valId).textContent = el.value;
}
function toggleCheck(id) {
  const el = document.getElementById(id);
  el.checked = !el.checked;
}
function val(id) { return (document.getElementById(id).value || '').trim(); }

// ─── Folder picker ────────────────────────────────────────────────
document.getElementById('folderInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files)
    .filter(f => /\.(jpe?g|png|gif|webp|heic|heif|avif|tiff?)$/i.test(f.name))
    .sort((a,b) => a.name.localeCompare(b.name));

  // Revoke old URLs
  photoUrls.forEach(u => URL.revokeObjectURL(u));
  photoUrls = [];

  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';

  if (files.length === 0) {
    document.getElementById('folderCount').textContent = 'Geen afbeeldingen gevonden in deze map.';
    document.getElementById('folderCount').classList.add('visible');
    return;
  }

  document.getElementById('folderCount').textContent = `${files.length} foto${files.length !== 1 ? "'s" : ''} gevonden`;
  document.getElementById('folderCount').classList.add('visible');

  files.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    photoUrls.push(url);

    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.title = file.name;
    div.innerHTML = `<img src="${url}" loading="lazy"><div class="thumb-name">${file.name}</div>`;
    div.addEventListener('click', () => selectThumb(i, url, div));
    grid.appendChild(div);
  });
});

function selectThumb(i, url, el) {
  document.querySelectorAll('.photo-thumb').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');

  const img = new Image();
  img.onload = () => {
    selectedPhotoImg = img;
    selectedPhotoURL = url;
    photoOffsetX = 0;   // reset positie bij nieuwe foto
    photoOffsetY = 0;
    draw();
  };
  img.src = url;
}

// ─── Kleur-offset titel (zelfde techniek als Poster Generator) ────
// Lagen (van achter naar voren):
//   1. Geel  → links-schuin-beneden (grootste offset)
//   2. Rood  → links-schuin-beneden (kleiner)
//   3. Blauw → rechts-schuin-boven
//   4. Rood  → verschil-blend op blauw
//   5. Wit   → solid bovenop
function drawOffsetTitle(text, x, y, fontSize, offsetPx) {
  if (!text) return;
  ctx.save();
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.font = `900 ${fontSize}px Montserrat, sans-serif`;

  const off = offsetPx;

  // 1. Geel — links schuin beneden
  ctx.globalAlpha = 0.90;
  ctx.fillStyle = '#FFF042';
  ctx.fillText(text, x - off, y + off);

  // 2. Rood — links schuin beneden (kleiner)
  ctx.globalAlpha = 0.88;
  ctx.fillStyle = '#E63323';
  ctx.fillText(text, x - off * 0.5, y + off * 0.5);

  // 3. Blauw — rechts schuin boven
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 0.90;
  ctx.fillStyle = '#41C0F0';
  ctx.fillText(text, x + off, y - off);

  // 4. Rood difference — paars/violet overlap met blauw
  ctx.globalCompositeOperation = 'difference';
  ctx.globalAlpha = 1.0;
  ctx.fillStyle = '#E63323';
  ctx.fillText(text, x + off * 0.5, y - off * 0.5);

  // 5. Wit — solid bovenop
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1.0;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(text, x, y);

  ctx.restore();
}

// ─── Hoofd teken-functie ──────────────────────────────────────────
function draw() {
  if (!fontsReady) return;

  const fmt = FORMATS[currentFmt];
  const CW = fmt.w;
  const CH = fmt.h;

  // Achtergrond
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, CW, CH);

  // ─── Foto ─────────────────────────────────────────────────────
  if (selectedPhotoImg) {
    const img = selectedPhotoImg;
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const zoneRatio = CW / CH;
    let dW, dH;
    if (imgRatio > zoneRatio) { dH = CH; dW = dH * imgRatio; }
    else                       { dW = CW; dH = dW / imgRatio; }

    const baseDX = (CW - dW) / 2;
    const baseDY = (CH - dH) / 2;

    // Clamp: foto mag niet kleiner worden dan canvas (geen witte randen)
    const minOffX = CW - dW - baseDX;   // negatief als dW > CW
    const maxOffX = -baseDX;             // positief als dW > CW
    const minOffY = CH - dH - baseDY;
    const maxOffY = -baseDY;
    photoOffsetX = Math.max(minOffX, Math.min(maxOffX, photoOffsetX));
    photoOffsetY = Math.max(minOffY, Math.min(maxOffY, photoOffsetY));

    ctx.drawImage(img, baseDX + photoOffsetX, baseDY + photoOffsetY, dW, dH);
  } else {
    // Placeholder raster
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#333';
    const gs = 60;
    for (let xx = 0; xx < CW; xx += gs) {
      for (let yy = 0; yy < CH; yy += gs) {
        if ((Math.floor(xx/gs) + Math.floor(yy/gs)) % 2 === 0) {
          ctx.fillRect(xx, yy, gs, gs);
        }
      }
    }
    ctx.fillStyle = '#555';
    ctx.font = `700 ${Math.round(CW * 0.022)}px Montserrat, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Selecteer een foto →', CW / 2, CH / 2);
  }

  // ─── Tekst-metrics EERST — zodat gradient blockTop kan volgen ────
  const PAD_X    = Math.round(CW * parseInt(document.getElementById('textPosX').value) / 100);
  const offsetPx = parseInt(document.getElementById('offsetAmount').value);
  const textPosYPct = parseInt(document.getElementById('textPosY').value) / 100;
  const titleScale1 = parseInt(document.getElementById('titleScale1').value) / 100;
  const titleScale2 = parseInt(document.getElementById('titleScale2').value) / 100;
  const labelText   = val('labelText').toUpperCase();
  const r1Text      = val('regel1').toUpperCase();
  const r2Text      = val('regel2').toUpperCase();

  const labelSize = Math.round(CW * 0.042);

  // Titel 1: start op schaalwaarde, daarna auto-inpassen als te breed
  let r1Size = Math.round(CW * 0.18 * titleScale1);
  ctx.font = `900 ${r1Size}px Montserrat, sans-serif`;
  while (r1Text && ctx.measureText(r1Text).width > CW - PAD_X * 2 - offsetPx * 2 && r1Size > 40) {
    r1Size -= 3;
    ctx.font = `900 ${r1Size}px Montserrat, sans-serif`;
  }

  // Titel 2
  let r2Size = Math.round(CW * 0.18 * titleScale2);
  ctx.font = `900 ${r2Size}px Montserrat, sans-serif`;
  while (r2Text && ctx.measureText(r2Text).width > CW - PAD_X * 2 - offsetPx * 2 && r2Size > 40) {
    r2Size -= 3;
    ctx.font = `900 ${r2Size}px Montserrat, sans-serif`;
  }

  const lineGap  = Math.round(r1Size * 0.01);
  const labelGap = Math.round(labelSize * 0.5);
  const totalH   = labelSize + labelGap + (r1Text ? r1Size + lineGap : 0) + (r2Text ? r2Size : 0);
  const blockTop = Math.round(CH * textPosYPct) - totalH;

  // Sla op voor drag-detectie
  lastBlockTop = blockTop;
  lastBlockH   = totalH;

  // ─── Gradient: start boven blockTop, groeit mee met tekstpositie ─
  const gradOpacity = parseInt(document.getElementById('gradOpacity').value) / 100;
  const gradPad     = Math.round(CH * 0.12);          // 12% extra ruimte boven tekst
  const gradStartY  = Math.max(0, blockTop - gradPad);
  const grad = ctx.createLinearGradient(0, gradStartY, 0, CH);
  grad.addColorStop(0, `rgba(0,0,0,0)`);
  grad.addColorStop(1, `rgba(0,0,0,${gradOpacity})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CW, CH);

  // ─── Roteer het hele tekstblok -4.5° om de linker-anker ──────────
  ctx.save();
  ctx.translate(PAD_X, blockTop);
  ctx.rotate(-4.5 * Math.PI / 180);
  ctx.translate(-PAD_X, -blockTop);

  let curY = blockTop;

  // Label tekst (wit, geen offset)
  if (labelText) {
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.font = `700 ${labelSize}px Montserrat, sans-serif`;
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(labelText, PAD_X, curY);
    ctx.restore();
    curY += labelSize + labelGap;
  }

  // Regel 1 (offset)
  if (r1Text) {
    const off1 = Math.round(r1Size * offsetPx / 100);
    drawOffsetTitle(r1Text, PAD_X, curY, r1Size, off1);
    curY += r1Size + lineGap;
  }

  // Regel 2 (offset)
  if (r2Text) {
    const off2 = Math.round(r2Size * offsetPx / 100);
    drawOffsetTitle(r2Text, PAD_X, curY, r2Size, off2);
    curY += r2Size;
  }

  ctx.restore(); // einde rotatie tekstblok

  // ─── Logo (rechtsonder) ────────────────────────────────────────
  if (document.getElementById('showLogo').checked) {
    drawLogoMark(CW, CH);
  }

  // ─── URL ──────────────────────────────────────────────────────
  if (document.getElementById('showUrl').checked) {
    const urlSize = Math.round(CW * 0.022);
    ctx.save();
    ctx.textBaseline = 'bottom';
    ctx.textAlign = 'right';
    ctx.font = `700 ${urlSize}px Montserrat, sans-serif`;
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('www.motionbeweegcollege.nl', CW - PAD_X, CH - Math.round(CW * 0.022));
    ctx.restore();
  }
}

// ─── Logo uit huisstijl map (MOTION-Logo Diap.png) rechtsonder ────
function drawLogoMark(CW, CH) {
  if (!motionLogo.complete || motionLogo.naturalWidth === 0) return;

  const PAD    = Math.round(CW * 0.05);
  const logoW  = Math.round(CW * 0.28);          // ~28% van canvasbreedte
  const logoH  = Math.round(logoW * (motionLogo.naturalHeight / motionLogo.naturalWidth));
  const lx     = CW - PAD - logoW;
  const ly     = CH - PAD - logoH;

  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.drawImage(motionLogo, lx, ly, logoW, logoH);
  ctx.restore();
}

// ─── Download ─────────────────────────────────────────────────────
function downloadImage() {
  draw();
  const fmt = FORMATS[currentFmt];
  const r1  = val('regel1').replace(/\s+/g, '-') || 'visual';
  const filename = `MOTION_Social_${fmt.label.replace(' ','-')}_${r1}.png`;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

// ─── Canvas drag handlers ─────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (canvas.height / rect.height)
  };
}

function nearTextBlock(canvasY) {
  // Hitzone: het tekstblok ± 60px rondom
  return canvasY >= lastBlockTop - 60 && canvasY <= lastBlockTop + lastBlockH + 60;
}

canvas.addEventListener('mousedown', (e) => {
  const pos = getCanvasPos(e);
  isDragging   = true;
  dragStartMX  = pos.x;
  dragStartMY  = pos.y;

  if (nearTextBlock(pos.y)) {
    dragMode      = 'text';
    dragStartTxtY = parseInt(document.getElementById('textPosY').value);
    canvas.style.cursor = 'ns-resize';
  } else {
    dragMode     = 'photo';
    dragStartPhX = photoOffsetX;
    dragStartPhY = photoOffsetY;
    canvas.style.cursor = 'grabbing';
  }
  e.preventDefault();
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getCanvasPos(e);

  if (!isDragging) {
    // Cursor hint op hover
    canvas.style.cursor = nearTextBlock(pos.y) ? 'ns-resize' : 'grab';
    return;
  }

  const dx = pos.x - dragStartMX;
  const dy = pos.y - dragStartMY;

  if (dragMode === 'photo') {
    photoOffsetX = dragStartPhX + dx;
    photoOffsetY = dragStartPhY + dy;
    draw();

  } else if (dragMode === 'text') {
    // Zet delta-pixels om naar percentage van canvas-hoogte
    const CH = FORMATS[currentFmt].h;
    const dyPct = Math.round(dy / CH * 100);
    let newY = Math.max(30, Math.min(97, dragStartTxtY + dyPct));
    document.getElementById('textPosY').value  = newY;
    document.getElementById('textPosVal').textContent = newY;
    draw();
  }
  e.preventDefault();
});

function stopDrag() {
  isDragging = false;
  dragMode   = null;
  canvas.style.cursor = 'grab';
}
canvas.addEventListener('mouseup',    stopDrag);
canvas.addEventListener('mouseleave', stopDrag);

// ─── Font loading ─────────────────────────────────────────────────
(async function waitForFonts() {
  try {
    await document.fonts.load("900 40px Montserrat");
    await document.fonts.load("700 40px Montserrat");
  } catch(e) {}
  fontsReady = true;
  initCanvas();
  draw();
})();
</script>
